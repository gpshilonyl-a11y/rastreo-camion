<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rastreo Camion - GPS en tiempo real</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/mqtt/dist/mqtt.esm.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #1a1a2e; color: #fff; }
        #header { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            padding: 15px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        #header h1 { font-size: 1.3em; font-weight: 600; }
        #status { 
            display: flex; align-items: center; gap: 8px; 
            background: rgba(255,255,255,0.15);
            padding: 6px 14px; border-radius: 20px; font-size: 0.9em;
        }
        #status-dot { width: 10px; height: 10px; border-radius: 50%; background: #ff4444; transition: background 0.3s; }
        #status-dot.connected { background: #00ff88; box-shadow: 0 0 10px #00ff88; }
        #map { height: calc(100vh - 160px); width: 100%; }
        #info-bar {
            background: #16213e; padding: 12px 20px;
            display: flex; justify-content: space-around; flex-wrap: wrap;
            gap: 15px; font-size: 0.85em; border-top: 1px solid #0f3460;
        }
        .info-item { display: flex; align-items: center; gap: 6px; }
        .info-item strong { color: #667eea; }
        #last-update { color: #888; font-size: 0.8em; text-align: center; padding: 8px; background: #0f3460; }
        .leaflet-popup-content-wrapper { background: #1a1a2e; color: #fff; border-radius: 8px; }
        .leaflet-popup-tip { background: #1a1a2e; }
        #bateria { color: #ffd700; }
    </style>
</head>
<body>
    <div id="header">
        <h1>[TRUCK] Rastreo Camion - GPS en tiempo real</h1>
        <div id="status">
            <div id="status-dot"></div>
            <span id="status-text">Conectando...</span>
        </div>
    </div>
    <div id="map"></div>
    <div id="info-bar">
        <div class="info-item">Lat: <strong id="lat">--</strong></div>
        <div class="info-item">Lon: <strong id="lon">--</strong></div>
        <div class="info-item">Precision: <strong id="acc">--</strong> m</div>
        <div class="info-item">Altitud: <strong id="alt">--</strong> m</div>
        <div class="info-item">Conexion: <strong id="conn">--</strong></div>
        <div class="info-item">Bateria: <strong id="batt">--</strong>%</div>
    </div>
    <div id="last-update">Ultima actualizacion: <span id="timestamp">--</span></div>

    <script>
        const BROKER = 'wss://mqtt.flespi.io:443';
        const USERNAME = 'FlespiToken';
        const PASSWORD = 'ryu9f5Qp12MHddIdV5Xzgewtot0MbNLkRt5oNCdyjDIFerIwco4b67eLZRyjAMdD';
        const TOPIC = 'owntracks/FlespiToken_ryu9f5Qp12MHddIdV5Xzgewtot0MbNLkRt5oNCdyjDIFerIwco4b67eLZRyjAMdD/camion';

        const map = L.map('map').setView([-34.8919, -56.1764], 16);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: 'OpenStreetMap', maxZoom: 19
        }).addTo(map);

        let marker = null;
        let path = [];
        let polyline = null;

        const client = mqtt.connect(BROKER, {
            username: USERNAME,
            password: PASSWORD,
            clientId: 'web_map_' + Math.random().toString(16).substr(2, 8),
            reconnectPeriod: 5000
        });

        client.on('connect', function() {
            document.getElementById('status-dot').classList.add('connected');
            document.getElementById('status-text').textContent = 'Conectado en tiempo real';
            client.subscribe(TOPIC);
        });

        client.on('message', function(topic, message) {
            try {
                const data = JSON.parse(message.toString());
                if (data._type === 'location' && data.lat && data.lon) {
                    document.getElementById('lat').textContent = data.lat.toFixed(6);
                    document.getElementById('lon').textContent = data.lon.toFixed(6);
                    document.getElementById('acc').textContent = data.acc || '--';
                    document.getElementById('alt').textContent = data.alt || '--';
                    document.getElementById('conn').textContent = data.conn === 'w' ? 'WiFi' : (data.conn === 'm' ? 'Movil' : data.conn || '--');
                    document.getElementById('batt').textContent = data.batt || '--';
                    document.getElementById('timestamp').textContent = new Date().toLocaleString('es-UY');

                    const latLng = [data.lat, data.lon];
                    if (marker) {
                        marker.setLatLng(latLng);
                    } else {
                        marker = L.marker(latLng).addTo(map);
                        marker.bindPopup('Camion - Posicion actual').openPopup();
                    }
                    path.push(latLng);
                    if (polyline) {
                        polyline.setLatLngs(path);
                    } else {
                        polyline = L.polyline(path, {color: '#667eea', weight: 4, opacity: 0.8}).addTo(map);
                    }
                    map.panTo(latLng);
                }
            } catch (e) {
                console.error('Error:', e);
            }
        });

        client.on('error', function() {
            document.getElementById('status-text').textContent = 'Error de conexion';
        });

        client.on('offline', function() {
            document.getElementById('status-dot').classList.remove('connected');
            document.getElementById('status-text').textContent = 'Desconectado - Reconectando...';
        });
    </script>
</body>
</html>
