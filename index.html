<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rastreo Camion - GPS</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #1a1a2e; color: #fff; }
        #header { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            padding: 15px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }
        #header h1 { font-size: 1.3em; }
        #status { 
            display: flex; align-items: center; gap: 8px; 
            background: rgba(255,255,255,0.15);
            padding: 6px 14px; border-radius: 20px; font-size: 0.9em;
        }
        #status-dot { width: 10px; height: 10px; border-radius: 50%; background: #ff4444; }
        #status-dot.connected { background: #00ff88; box-shadow: 0 0 10px #00ff88; }
        #map { height: 70vh; width: 100%; }
        #info-bar {
            background: #16213e; padding: 12px 20px;
            display: flex; justify-content: space-around; flex-wrap: wrap;
            gap: 15px; font-size: 0.85em;
        }
        .info-item { display: flex; align-items: center; gap: 6px; }
        .info-item strong { color: #667eea; }
        #last-update { color: #888; font-size: 0.8em; text-align: center; padding: 8px; background: #0f3460; }
    </style>
</head>
<body>
    <div id="header">
        <h1>[TRUCK] Rastreo Camion - GPS</h1>
        <div id="status">
            <div id="status-dot"></div>
            <span id="status-text">Cargando...</span>
        </div>
    </div>
    <div id="map"></div>
    <div id="info-bar">
        <div class="info-item">Lat: <strong id="lat">--</strong></div>
        <div class="info-item">Lon: <strong id="lon">--</strong></div>
        <div class="info-item">Precision: <strong id="acc">--</strong> m</div>
        <div class="info-item">Altitud: <strong id="alt">--</strong> m</div>
        <div class="info-item">Conexion: <strong id="conn">--</strong></div>
        <div class="info-item">Bateria: <strong id="batt">--</strong>%</div>
    </div>
    <div id="last-update">Ultima actualizacion: <span id="timestamp">--</span></div>

    <script>
        const TOKEN = 'ryu9f5Qp12MHddIdV5Xzgewtot0MbNLkRt5oNCdyjDIFerIwco4b67eLZRyjAMdD';
        const TOPIC = 'owntracks/FlespiToken_ryu9f5Qp12MHddIdV5Xzgewtot0MbNLkRt5oNCdyjDIFerIwco4b67eLZRyjAMdD/camion';
        
        const map = L.map('map').setView([-34.8919, -56.1764], 16);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: 'OpenStreetMap', maxZoom: 19
        }).addTo(map);
        
        let marker = null;
        let path = [];
        let polyline = null;
        
        async function fetchMessages() {
            try {
                const response = await fetch('https://flespi.io/gw/devices/all', {
                    method: 'GET',
                    headers: {
                        'Authorization': 'FlespiToken ' + TOKEN,
                        'Content-Type': 'application/json'
                    }
                });
                
                if (!response.ok) throw new Error('HTTP ' + response.status);
                
                const data = await response.json();
                console.log('Datos recibidos:', data);
                
                // Buscar mensajes del topic del camion
                if (data && data.result) {
                    // Procesar datos
                    document.getElementById('status-dot').classList.add('connected');
                    document.getElementById('status-text').textContent = 'Conectado';
                }
            } catch (e) {
                console.error('Error:', e);
                document.getElementById('status-text').textContent = 'Error: ' + e.message;
            }
        }
        
        // Intentar con API alternativa
        async function fetchMQTTMessages() {
            try {
                const response = await fetch('https://flespi.io/mqtt/messages', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'FlespiToken ' + TOKEN,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        topics: [TOPIC],
                        limit: 1
                    })
                });
                
                if (!response.ok) throw new Error('HTTP ' + response.status);
                
                const data = await response.json();
                console.log('MQTT Messages:', data);
                
                if (data && data.length > 0) {
                    const msg = data[0];
                    updateMap(msg);
                }
            } catch (e) {
                console.error('Error MQTT:', e);
                // Fallback: usar datos de prueba para verificar que el mapa funciona
                document.getElementById('status-text').textContent = 'Modo demo - MQTT no disponible desde web';
                document.getElementById('status-dot').style.background = '#ffd700';
            }
        }
        
        function updateMap(data) {
            if (!data || !data.lat || !data.lon) return;
            
            document.getElementById('lat').textContent = data.lat.toFixed(6);
            document.getElementById('lon').textContent = data.lon.toFixed(6);
            document.getElementById('acc').textContent = data.acc || '--';
            document.getElementById('alt').textContent = data.alt || '--';
            document.getElementById('conn').textContent = data.conn || '--';
            document.getElementById('batt').textContent = data.batt || '--';
            document.getElementById('timestamp').textContent = new Date().toLocaleString('es-UY');
            
            document.getElementById('status-dot').classList.add('connected');
            document.getElementById('status-text').textContent = 'Conectado en tiempo real';
            
            const latLng = [data.lat, data.lon];
            if (marker) {
                marker.setLatLng(latLng);
            } else {
                marker = L.marker(latLng).addTo(map);
                marker.bindPopup('Camion - Posicion actual').openPopup();
            }
            path.push(latLng);
            if (polyline) {
                polyline.setLatLngs(path);
            } else {
                polyline = L.polyline(path, {color: '#667eea', weight: 4}).addTo(map);
            }
            map.panTo(latLng);
        }
        
        // Cargar datos
        fetchMQTTMessages();
        setInterval(fetchMQTTMessages, 10000);
    </script>
</body>
</html>
